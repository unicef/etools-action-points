trigger:
  branches:
    include:
      - develop
      - staging
      - master

  tags:
    include:
      - '*'

pr:
  branches:
    include:
      - '*'

variables:
  NODE_VERSION: '22.21.1'
  DOCKER_IMAGE: unicef/etools-action-points

stages:
- stage: Lint
  displayName: Lint
  jobs:
    - job: Lint
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self
          fetchDepth: 1

        - task: NodeTool@0
          displayName: 'Use Node.js $(NODE_VERSION)'
          inputs:
            versionSpec: '$(NODE_VERSION)'

        - task: Cache@2
          inputs:
            key: 'npm | "$(Agent.OS)" | package-lock.json'
            path: node_modules
          displayName: Restore npm cache

        - script: npm ci
          displayName: Install dependencies

        - script: npm run lint
          displayName: Run ESLint

- stage: BuildImage
  displayName: Build and Push Image
  dependsOn: Lint
  condition: |
    and(
      succeeded(),
      ne(variables['Build.Reason'], 'PullRequest')
    )

  jobs:
  - job: BuildApp
    displayName: Build and Push Final Image
    pool:
      vmImage: ubuntu-latest

    steps:
      - checkout: self
        fetchDepth: 0

      # SAFE_BRANCH is derived from Build.SourceBranchName.
      # - On branch builds: it is the branch name (sanitized)
      # - On tag builds: it is the *tag name* (sanitized)
      # SAFE_BRANCH is used everywhere, so we NEVER use Build.SourceBranchName directly to avoid invalid Docker tags
      - script: |
          SAFE_BRANCH=$(echo "$(Build.SourceBranchName)" \
            | tr '/' '-' \
            | tr -cd 'a-zA-Z0-9._-')
          BUILD_DATE=$(date -u +%Y%m%d)
          BRANCH_DATE_TAG="${SAFE_BRANCH}${BUILD_DATE}"
          echo "##vso[task.setvariable variable=SAFE_BRANCH;isOutput=true]$SAFE_BRANCH"
          echo "##vso[task.setvariable variable=BRANCH_DATE_TAG;isOutput=true]$BRANCH_DATE_TAG"
        name: sanitize
        displayName: Sanitize branch name

      - script: |
          REVNO=$(Build.SourceVersion)
          BUILDDATE=$(date -u +%F_%T)

          sed -i "0,/revNo/s//$REVNO/" package.json
          sed -i "0,/revNo/s//$REVNO/" index.html
          sed -i "0,/revNo/s//$REVNO/" version.json
          sed -i "0,/bDate/s//$BUILDDATE/" package.json
          sed -i "0,/bDate/s//$BUILDDATE/" version.json
          sed -i "0,/bDate/s//$BUILDDATE/" index.html
        displayName: Inject build metadata

      - task: Docker@2
        displayName: Login to DockerHub
        inputs:
          command: login
          containerRegistry: dockerhub

      - task: Docker@2
        displayName: Build image
        inputs:
          command: build
          repository: $(DOCKER_IMAGE)
          dockerfile: Dockerfile
          buildContext: .
          containerRegistry: dockerhub
          tags: |
            $(sanitize.SAFE_BRANCH)
            $(sanitize.BRANCH_DATE_TAG)
            $(Build.SourceVersion)

      - task: Docker@2
        displayName: Push image
        inputs:
          command: push
          repository: $(DOCKER_IMAGE)
          containerRegistry: dockerhub
          tags: |
            $(sanitize.SAFE_BRANCH)
            $(sanitize.BRANCH_DATE_TAG)
            $(Build.SourceVersion)

- stage: DeployDevelop
  displayName: Deploy to Develop (Rancher)
  dependsOn: BuildImage
  condition: |
    and(
      succeeded(),
      eq(variables['Build.SourceBranch'], 'refs/heads/develop')
    )

  variables:
    - group: rke-cluster-devtst

  jobs:
  - deployment: Deploy
    displayName: Deploy to develop
    environment: dev
    pool:
      vmImage: ubuntu-latest
    strategy:
      runOnce:
        deploy:
          steps:
            - task: KubectlInstaller@0
              displayName: Install kubectl
              inputs:
                kubectlVersion: 'v1.16.2'

            - script: |
                mkdir -p ~/.kube
                echo "$(KUBECONFIG_B64)" | base64 -d > ~/.kube/config
                chmod 600 ~/.kube/config
                kubectl config use-context rke-cluster-devtst
              displayName: Configure kubeconfig

            - script: |
                IMAGE="$(DOCKER_IMAGE):$(Build.SourceVersion)"
                echo "Deploying image: $IMAGE"
                kubectl -n etools-dev \
                  set image deployment/action-points-dev \
                  action-points-dev=$IMAGE
              displayName: Deploy application

            - script: |
                kubectl rollout status deployment/action-points-dev \
                  -n etools-dev \
                  --timeout=300s
              displayName: Wait for pods to start

- stage: DeployStaging
  displayName: Deploy to Staging (Rancher)
  dependsOn: BuildImage
  condition: |
    and(
      succeeded(),
      eq(variables['Build.SourceBranch'], 'refs/heads/staging')
    )

  variables:
    - group: rke-cluster-etstgtrn

  jobs:
  - deployment: Deploy
    displayName: Deploy to staging
    environment: staging
    pool:
      vmImage: ubuntu-latest
    strategy:
      runOnce:
        deploy:
          steps:
            - task: KubectlInstaller@0
              displayName: Install kubectl
              inputs:
                kubectlVersion: 'v1.16.2'

            - script: |
                mkdir -p ~/.kube
                echo "$(KUBECONFIG_B64)" | base64 -d > ~/.kube/config
                chmod 600 ~/.kube/config
                kubectl config use-context rke-cluster-etstgtrn
              displayName: Configure kubeconfig

            - script: |
                IMAGE="$(DOCKER_IMAGE):$(Build.SourceVersion)"
                echo "Deploying image: $IMAGE"
                kubectl -n etools-staging \
                  set image deployment/action-points-staging \
                  action-points-staging=$IMAGE
              displayName: Deploy application

            - script: |
                kubectl rollout status deployment/action-points-staging \
                  -n etools-staging \
                  --timeout=300s
              displayName: Wait for pods to start

- stage: DeployProd
  displayName: Deploy to Production (Rancher)
  dependsOn: BuildImage
  condition: |
    and(
      succeeded(),
      startsWith(variables['Build.SourceBranch'], 'refs/tags/')
    )

  variables:
    - group: rke-cluster-etools
    - name: SAFE_BRANCH
      value: $[ stageDependencies.BuildImage.BuildApp.outputs['sanitize.SAFE_BRANCH'] ]

  jobs:
  - deployment: Deploy
    displayName: Deploy to production
    environment: prod
    pool:
      vmImage: ubuntu-latest
    strategy:
      runOnce:
        deploy:
          steps:
            - task: KubectlInstaller@0
              displayName: Install kubectl
              inputs:
                kubectlVersion: 'v1.16.2'

            - script: |
                mkdir -p ~/.kube
                echo "$(KUBECONFIG_B64)" | base64 -d > ~/.kube/config
                chmod 600 ~/.kube/config
                kubectl config use-context rke-cluster-etools
              displayName: Configure kubeconfig

            # Deploy sanitized tag (SAFE_BRANCH). For tag-triggered runs, SAFE_BRANCH == sanitized Git tag
            - script: |
                IMAGE="$(DOCKER_IMAGE):$(SAFE_BRANCH)"
                echo "Deploying image: $IMAGE"
                kubectl -n etools-prod \
                  set image deployment/action-points-prod \
                  action-points-prod=$IMAGE
              displayName: Deploy application

            - script: |
                kubectl rollout status deployment/action-points-prod \
                  -n etools-prod \
                  --timeout=300s
              displayName: Wait for pods to start
